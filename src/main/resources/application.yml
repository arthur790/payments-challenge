spring:
  application:
    name: payments
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/payments_db}
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  rabbitmq:
    payment-status-exchange: payment.status.events
    payment-status-queue-notify: payment.status.notify.email
    payment-status-queue-audit: payment.status.audit

server:
  port: ${SERVER_PORT:8080}
